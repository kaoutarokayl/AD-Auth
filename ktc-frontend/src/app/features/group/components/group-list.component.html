<div class="group-container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Groupes</h2>
      <button class="btn-add">+ Nouveau Groupe</button>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="loading" *ngIf="loading">
      Chargement des groupes...
    </div>

    <div class="group-list" *ngIf="!loading && groups.length > 0">
      <div
        *ngFor="let group of groups"
        class="group-item"
        [class.selected]="selectedGroupId === group.groupId"
        (click)="selectGroup(group.groupId)"
      >
        <div class="group-info">
          <div class="group-name">{{ group.groupName }}</div>
          <div class="group-meta">
            <span *ngIf="group.groupTypeId" class="badge">Type: {{ group.groupTypeId }}</span>
          </div>
        </div>
        <button
          class="btn-delete"
          (click)="deleteGroup(group.groupId, $event)"
          title="Supprimer ce groupe"
        >
          ✕
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="!loading && groups.length === 0">
      <p>Aucun groupe trouvé</p>
    </div>
  </div>

  <div class="main-content">
    <app-group-details
      *ngIf="selectedGroupId"
      [groupId]="selectedGroupId"
    ></app-group-details>
    <div class="placeholder" *ngIf="!selectedGroupId">
      <p>Sélectionnez un groupe pour voir ses détails</p>
    </div>
  </div>
</div>
