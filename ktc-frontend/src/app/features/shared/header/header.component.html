<header class="app-header">
  <!-- Brand -->
  <div class="header-brand">
    <div class="brand-mark" aria-hidden="true">K</div>
    <span class="brand-name">KTC Web</span>
  </div>

  <!-- Right actions -->
  <div class="header-actions">

    <!-- Bouton Administration (Support) -->
    <div class="support-wrapper" (click)="goToAdministration()">
      <button class="support-btn">
        ⚙️ Administration
      </button>
    </div>

    <!-- Profile dropdown (inchangé) -->
    <div class="profile-wrapper" (click)="toggleProfile($event)">
      <div class="avatar" [title]="user()?.username || 'Utilisateur'">
        {{ userInitial() }}
      </div>
      <div class="profile-info">
        <span class="profile-name">{{ user()?.username || '—' }}</span>
        <span class="profile-role">{{ primaryRole() }}</span>
      </div>
      <span class="chevron" [class.open]="isProfileOpen()">&#8964;</span>
    </div>

    <div class="profile-dropdown" *ngIf="isProfileOpen()" (click)="$event.stopPropagation()">
      <div class="dropdown-header">
        <div class="dropdown-avatar">{{ userInitial() }}</div>
        <div>
          <div class="dropdown-name">{{ user()?.username || '—' }}</div>
          <div class="dropdown-email">{{ user()?.email || '' }}</div>
        </div>
      </div>
      <div class="dropdown-roles" *ngIf="roles()?.length">
        <span class="roles-label">Rôles</span>
        <div class="roles-list">
          <span class="role-badge" *ngFor="let role of roles()">{{ role }}</span>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <button class="logout-btn" (click)="logout()">
        <span class="logout-icon">⎋</span>
        Déconnexion
      </button>
    </div>

  </div>
</header>
